<section class="villagers">
    <div class="top" id="top">
        <div class="go-home" id="go-home">
            <button class="back-btn" (click)="goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/>
                </svg>
            </button>
        </div>

        <div class="search-bar" id="search-bar">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5S14 7.01 14 9.5S11.99 14 9.5 14"/>
            </svg>
            <input class="search-input" type="text" placeholder="Rechercher..." (input)="onSearch($event)" />
        </div>
        <div class="filters" id="filters">
            <button class="filter-toggle-btn" (click)="toggleFilterPanel()">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M3 4h18v2.172a2 2 0 0 1-.586 1.414L15 13v7l-6-2v-5L3.586 7.586A2 2 0 0 1 3 6.172z"/>
                </svg>
                Filtres
            </button>

            @if (filterPanelOpen) {
                <div class="filter-panel">
                    <div class="filter-section">
                        <p class="filter-label">Tri</p>
                        <div class="filter-options">
                            <button class="filter-option-btn" [class.active]="sortMode() === 'alpha-asc'" (click)="setSort('alpha-asc')">A → Z</button>
                            <button class="filter-option-btn" [class.active]="sortMode() === 'alpha-desc'" (click)="setSort('alpha-desc')">Z → A</button>
                        </div>
                    </div>
                    <div class="filter-section">
                        <p class="filter-label">Genre</p>
                        <div class="filter-options">
                            <button class="filter-option-btn" [class.active]="genderFilter() === 'all'" (click)="setGender('all')">Tous</button>
                            <button class="filter-option-btn" [class.active]="genderFilter() === 'Mâle'" (click)="setGender('Mâle')">Mâle</button>
                            <button class="filter-option-btn" [class.active]="genderFilter() === 'Femelle'" (click)="setGender('Femelle')">Femelle</button>
                        </div>
                    </div>
                    <div class="filter-section">
                        <p class="filter-label">Espèce</p>
                        <div class="filter-options filter-options--wrap">
                            <button class="filter-option-btn" [class.active]="speciesFilter() === 'all'" (click)="setSpecies('all')">Toutes</button>
                            @for (s of uniqueSpecies; track s) {
                                <button class="filter-option-btn" [class.active]="speciesFilter() === s" (click)="setSpecies(s)">{{s}}</button>
                            }
                        </div>
                    </div>
                    <div class="filter-section">
                        <p class="filter-label">Personnalité</p>
                        <div class="filter-options filter-options--wrap">
                            <button class="filter-option-btn" [class.active]="personalityFilter() === 'all'" (click)="setPersonality('all')">Toutes</button>
                            @for (p of uniquePersonalities; track p) {
                                <button class="filter-option-btn" [class.active]="personalityFilter() === p" (click)="setPersonality(p)">{{p}}</button>
                            }
                        </div>
                    </div>
                    <button class="filter-reset-btn" (click)="resetFilters()">Réinitialiser</button>
                </div>
            }
        </div>

    </div>
    <div class="villager-grid-wrapper" id="villager-grid-wrapper">
        <div class="villager-grid" id="villager-grid">
            @for (villager of filteRougeVillagers(); track villager.fr) {
                <div class="clickable-div">
                    <div class="villager-box">
                        <div class="icon-box" id="icon-box">
                            <img [src]="iconPath(villager.en)" [alt]="villager.fr">
                        </div>
                        <div class="name-box" id="name">
                            <p class="name" id="name">{{villager.fr}}</p>
                        </div>
                        <div class="favorite-box" id="favorite-box">
                            <button class="favorite-btn" id="favorite-btn" (click)="toggleFavorite(villager)">
                                @if (!villager.isFavorite()) {
                                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title xmlns="">star-outline-rounded</title><path fill="currentColor" d="m8.85 16.825l3.15-1.9l3.15 1.925l-.825-3.6l2.775-2.4l-3.65-.325l-1.45-3.4l-1.45 3.375l-3.65.325l2.775 2.425zm3.15.45l-4.15 2.5q-.275.175-.575.15t-.525-.2t-.35-.437t-.05-.588l1.1-4.725L3.775 10.8q-.25-.225-.312-.513t.037-.562t.3-.45t.55-.225l4.85-.425l1.875-4.45q.125-.3.388-.45t.537-.15t.537.15t.388.45l1.875 4.45l4.85.425q.35.05.55.225t.3.45t.038.563t-.313.512l-3.675 3.175l1.1 4.725q.075.325-.05.588t-.35.437t-.525.2t-.575-.15zm0-5.025"/></svg>
                                } @else {
                                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title xmlns="">star-rounded</title><path fill="currentColor" d="m12 17.275l-4.15 2.5q-.275.175-.575.15t-.525-.2t-.35-.437t-.05-.588l1.1-4.725L3.775 10.8q-.25-.225-.312-.513t.037-.562t.3-.45t.55-.225l4.85-.425l1.875-4.45q.125-.3.388-.45t.537-.15t.537.15t.388.45l1.875 4.45l4.85.425q.35.05.55.225t.3.45t.038.563t-.313.512l-3.675 3.175l1.1 4.725q.075.325-.05.588t-.35.437t-.525.2t-.575-.15z"/></svg>
                                }
                            </button>
                        </div>
                        <div class="add-to-home" id="add-to-home">
                            <button class="add-to-home-btn" (click)="toggleAdded(villager)">
                                @if (!villager.isAdded()) {
                                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 640 640"><title xmlns="">house</title><path fill="currentColor" d="M304 70.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2v205.3c0 35.3-28.7 64-64 64h-288c-35.3 0-64-28.7-64-64V306.6l-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9zm16 50.1L160 263.7V512c0 8.8 7.2 16 16 16h48V424c0-39.8 32.2-72 72-72h48c39.8 0 72 32.2 72 72v104h48c8.8 0 16-7.2 16-16V263.7L320 120.3zM272 528h96V424c0-13.3-10.7-24-24-24h-48c-13.3 0-24 10.7-24 24z"/></svg>
                                } @else {
                                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 640 640"><title xmlns="">house</title><path fill="currentColor" d="M341.8 72.6c-12.3-11.4-31.3-11.4-43.5 0l-224 208c-9.6 9-12.8 22.9-8 35.1S82.8 336 96 336h16v176c0 35.3 28.7 64 64 64h288c35.3 0 64-28.7 64-64V336h16c13.2 0 25-8.1 29.8-20.3s1.6-26.2-8-35.1zM304 384h32c26.5 0 48 21.5 48 48v96H256v-96c0-26.5 21.5-48 48-48"/></svg>
                                }
                            </button>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
</section>
