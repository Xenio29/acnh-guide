<section class="island-create">

    <div class="title">
        <h1>Création de l'île</h1>
    </div>
    <div class="island-name">
        <input type="text" class="name-island" placeholder="Nom de l'île" id="name-island" alt="Nom de l'île">
    </div>
    <div class="hemisphere">
        <fieldset id="hemi-form">
            <legend id="form-title">Hémisphère</legend>

            <div id="north">
                <input type="radio" name="hemisphere" id="north" value="north" checked>
                <label for="north">Nord</label>
            </div>
            <div id="south">
                <input type="radio" name="hemisphere" id="south" value="south" checked>
                <label for="south">Sud</label>
            </div>
        </fieldset>
    </div>
    <div class="fruit">
        <fieldset id="fruit-form">
            <legend id="form-title">Fruit</legend>

            <div id="apple">
                <input type="radio" name="fruit" id="apple" value="apple" checked>
                <label for="apple">Pomme</label>
            </div>
            <div id="pear">
                <input type="radio" name="fruit" id="pear" value="pear" checked>
                <label for="pear">Poire</label>
            </div>
            <div id="peach">
                <input type="radio" name="fruit" id="peach" value="peach" checked>
                <label for="peach">Pêche</label>
            </div>
            <div id="cherry">
                <input type="radio" name="fruit" id="cherry" value="cherry" checked>
                <label for="cherry">Cerise</label>
            </div>
            <div id="orange">
                <input type="radio" name="fruit" id="orange" value="orange" checked>
                <label for="orange">Orange</label>
            </div>
        </fieldset>
    </div>
    <div class="villagers">
        
    </div>
    

</section>
